# Reusable: air format check + lintr + goodpractice, hard-failing on any
# violation. Triggers (push / pull_request) live in each package's caller stub.
on:
  workflow_call:
    inputs:
      extra-packages:
        description: "Extra packages appended to the lint/gp `local::.` install (e.g. a github:: source dep)."
        type: string
        default: ""
      install-spatial-deps:
        description: "Install GDAL/PROJ/GEOS/udunits/magick/glpk/harfbuzz system libraries (needed to build local::. for sf/terra pkgs)."
        type: boolean
        default: false
      goodpractice:
        description: "Run the goodpractice job. Set false for template packages with no R/ or man/."
        type: boolean
        default: true

name: code-quality (reusable)

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Check tidyverse style
        uses: posit-dev/setup-air@v1
      - run: air format --check .

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Linux system dependencies
        if: ${{ inputs.install-spatial-deps }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libproj-dev libgeos-dev libudunits2-dev libmagick++-dev libglpk-dev libharfbuzz-dev libfribidi-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::.${{ inputs.extra-packages != '' && format(', {0}', inputs.extra-packages) || '' }}
          needs: lint

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true

  good-practice:
    if: ${{ inputs.goodpractice }}
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false
      _R_CHECK_RD_XREFS_: false
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Install Linux system dependencies
        if: ${{ inputs.install-spatial-deps }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libproj-dev libgeos-dev libudunits2-dev libmagick++-dev libglpk-dev libharfbuzz-dev libfribidi-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::goodpractice, local::.${{ inputs.extra-packages != '' && format(', {0}', inputs.extra-packages) || '' }}
          needs: gp

      - name: Check Good Practice
        id: gp
        run: |
          # All goodpractice + tidyverse checks gate this job, minus a curated
          # list of checks that misfire on this ecosystem's conventions. Each is
          # excluded per-check-id (surgical, NOT a blanket lint-disable) so every
          # other check still hard-fails. goodpractice lints with a much broader
          # linter set than each package's .lintr (lintr defaults); the entries
          # below are the non-default linters / URL checks that produce genuine
          # false positives on ecosystem idioms:
          #  * strings_as_factors_linter: packages Depend on R (>= 4.1.0),
          #    where stringsAsFactors already defaults to FALSE.
          #  * tidyverse_r_file_names: rejects hyphens ("[A-Z]|[- ]"), which
          #    wrongly fails kebab-case file names. The tidyverse style guide
          #    permits kebab-case; this is a goodpractice bug. Temporary until
          #    the check is fixed upstream to allow kebab-case.
          #  * duplicate_argument_linter: misreads cli's multi-bullet idiom
          #    cli_abort(c("msg", "i" = ..., "i" = ...)) as duplicate c() args.
          #    Repeated "i"/"x"/"!" bullets are the standard cli error format.
          #  * scalar_in_linter: flags `x %in% "val"`, but %in% is deliberately
          #    NA-safe (NA %in% "val" is FALSE); the suggested == leaks NA.
          #  * unnecessary_lambda_linter: flags arg-capturing lambdas like
          #    function(x) f(x, extra = e) that cannot collapse to a bare symbol.
          #  * urlchecker_ok / urlchecker_no_redirects: the shared citation DOI
          #    (doi.org/10.1177/2515245920928009) redirects to SAGE, which
          #    bot-blocks automated checkers (403). DOIs are meant to redirect;
          #    URL liveness is already covered by R-CMD-check.
          checks <- setdiff(
            union(goodpractice::all_checks(), goodpractice::tidyverse_checks()),
            c(
              "lintr_strings_as_factors_linter",
              "tidyverse_r_file_names",
              "lintr_duplicate_argument_linter",
              "lintr_scalar_in_linter",
              "lintr_unnecessary_lambda_linter",
              "urlchecker_ok",
              "urlchecker_no_redirects",
              # The following are not false positives, but checks deliberately
              # left off the hard gate because they are covered elsewhere or are
              # subjective rather than correctness signals:
              #  * covr: coverage is already gated by the dedicated
              #    test-coverage job + Codecov. Hard-failing here on anything
              #    below 100% duplicates that job and blocks on unreachable
              #    defensive branches.
              #  * complexity_function_length: flags functions past a fixed line
              #    threshold. Length is not a correctness signal, and
              #    render/layout functions are legitimately long; splitting them
              #    purely to satisfy the metric adds risk, not value.
              #  * tidyverse_test_file_names: expects a test-<file>.R for every
              #    R/ file, which false-positives on files holding no testable
              #    code (e.g. <pkg>-package.R doc stubs, re-export shims).
              "covr",
              "complexity_function_length",
              "tidyverse_test_file_names"
            )
          )

          gp_result <- goodpractice::gp(checks = checks)
          failed <- goodpractice::failed_checks(gp_result)
          status <- if (length(failed) == 0) "success" else "failure"

          # goodpractice 1.1.0's print() emits no advice text for most checks,
          # so build an explicit report of the failed check ids + positions
          # instead of relying on capture.output(print(gp_result)).
          if (length(failed) == 0) {
            report <- "All goodpractice checks passed."
          } else {
            report <- c(
              sprintf("%d goodpractice check(s) failed:", length(failed)),
              ""
            )
            for (nm in failed) {
              report <- c(report, paste0("- ", nm))
              pos <- tryCatch(
                gp_result$checks[[nm]]$positions,
                error = function(e) NULL
              )
              n <- length(pos)
              for (i in seq_len(min(n, 15L))) {
                p <- pos[[i]]
                label <- names(pos)[i]
                if (is.list(p) && !is.null(p$filename)) {
                  ln <- if (!is.null(p$line_number)) p$line_number else ""
                  report <- c(report, sprintf("    %s:%s", p$filename, ln))
                } else if (!is.null(label) && nzchar(label)) {
                  report <- c(report, sprintf("    %s", label))
                }
              }
              if (n > 15L) {
                report <- c(report, sprintf("    ... and %d more", n - 15L))
              }
            }
          }
          writeLines(report, "gp-results.txt")
          cat(
            sprintf("status=%s\n", status),
            file = Sys.getenv("GITHUB_OUTPUT"),
            append = TRUE
          )
        shell: Rscript {0}

      # Sticky comment: one comment per PR, updated in place each run (never a
      # new comment). Identified by the hidden marker below. On success an
      # existing failure comment is flipped to the passing state; if none
      # exists on success, nothing is posted.
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          GP_STATUS: ${{ steps.gp.outputs.status }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- good-practice-check -->';
            const status = process.env.GP_STATUS;

            let body;
            if (status === 'failure') {
              const results = fs.readFileSync('gp-results.txt', 'utf8');
              body = [
                marker,
                '⚠️ **Good Practice Check: Some checks need attention**',
                '',
                '<details>',
                '<summary>Click to see full results</summary>',
                '',
                '```',
                results,
                '```',
                '',
                '</details>',
              ].join('\n');
            } else {
              body = `${marker}\n✅ **Good Practice Check: All checks passed.**`;
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else if (status === 'failure') {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Enforce good practice
        if: steps.gp.outputs.status == 'failure'
        run: |
          echo "::error::goodpractice checks failed — see gp-results above."
          cat gp-results.txt
          exit 1
