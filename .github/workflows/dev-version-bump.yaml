# Reusable: after a release (DESCRIPTION Version is x.y.z) is pushed to the
# default branch, bump to the next development version (x.y.z.9000) and prepend
# a NEWS "(development version)" heading, then open a PR that ggseg-bot
# auto-merges. Development versions are skipped, so merging this bump does not
# re-trigger a bump (self-terminating). Called by each package via a thin caller
# stub that triggers on push to the default branch touching DESCRIPTION.
on:
  workflow_call:

name: dev-version-bump (reusable)

permissions:
  contents: write
  pull-requests: write

jobs:
  dev-version-bump:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Mint ggseg-bot token
        id: bot
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GGSEG_BOT_APP_ID }}
          private-key: ${{ secrets.GGSEG_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.bot.outputs.token }}

      - name: Determine version
        id: version
        run: |
          version=$(grep -m1 '^Version:' DESCRIPTION | sed -E 's/^Version:[[:space:]]*//')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $version is already a development version; nothing to bump."
          fi

      - name: Bump to development version
        id: bump
        if: steps.version.outputs.is_release == 'true'
        run: |
          version="${{ steps.version.outputs.version }}"
          newver="${version}.9000"
          pkg=$(grep -m1 '^Package:' DESCRIPTION | sed -E 's/^Package:[[:space:]]*//')
          sed -i "s/^Version:.*/Version: ${newver}/" DESCRIPTION
          if [ -f NEWS.md ] && ! head -1 NEWS.md | grep -q '(development version)'; then
            { printf '# %s (development version)\n\n' "$pkg"; cat NEWS.md; } > NEWS.md.tmp
            mv NEWS.md.tmp NEWS.md
          fi
          echo "newver=$newver" >> "$GITHUB_OUTPUT"

      # main is protected (PR + signed commits). create-pull-request commits via
      # the API, so the commit is GitHub-signed; ggseg-bot is a ruleset bypass
      # actor (bypass_mode: pull_request) so it can merge without a human review.
      - name: Open dev-version-bump PR
        id: cpr
        if: steps.version.outputs.is_release == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.bot.outputs.token }}
          add-paths: |
            DESCRIPTION
            NEWS.md
          commit-message: "chore: bump to development version ${{ steps.bump.outputs.newver }}"
          branch: ci/dev-version-bump
          delete-branch: true
          title: "chore: bump to development version ${{ steps.bump.outputs.newver }}"
          body: |
            Post-release bump to `${{ steps.bump.outputs.newver }}`.
            Generated by the `dev-version-bump` reusable workflow.

      - name: Merge dev-version-bump PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
        run: |
          pr="${{ steps.cpr.outputs.pull-request-number }}"
          repo="${{ github.repository }}"
          branch="ci/dev-version-bump"
          # Merge via the REST endpoint, not `gh pr merge`: the GraphQL mutation
          # behind `gh pr merge` does not honour the ggseg-bot ruleset bypass and
          # is rejected with "base branch policy prohibits the merge". The REST
          # merge endpoint honours the bypass_actor grant.
          for i in 1 2 3 4 5; do
            if gh api -X PUT "repos/$repo/pulls/$pr/merge" -f merge_method=squash; then
              echo "merged dev-version-bump PR #$pr"
              gh api -X DELETE "repos/$repo/git/refs/heads/$branch" || true
              exit 0
            fi
            echo "merge attempt $i not ready; retrying..."
            sleep 10
          done
          echo "::error::failed to merge dev-version-bump PR #$pr"
          exit 1
