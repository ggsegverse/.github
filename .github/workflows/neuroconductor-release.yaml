# Reusable: on a published GitHub release, push an empty commit to the
# default branch to trigger the Neuroconductor mirror. Called by each
# package via a thin caller stub with `secrets: inherit` so the
# NEUROCONDUCTOR_PAT is forwarded (default GITHUB_TOKEN cannot push here).
on:
  workflow_call:
    secrets:
      NEUROCONDUCTOR_PAT:
        required: true

name: neuroconductor-release (reusable)

permissions:
  contents: write

jobs:
  neuroconductor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.NEUROCONDUCTOR_PAT }}

      - name: Trigger Neuroconductor update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "neuroc_release ${{ github.event.release.tag_name }} [skip ci]"
          git push
