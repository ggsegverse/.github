# Reusable: render README.qmd via Quarto and commit the result on the
# default branch. Called by each package via a thin caller stub that
# triggers on pushes/PRs touching README.qmd.
on:
  workflow_call:

name: render-readme (reusable)

permissions:
  contents: write

jobs:
  render-readme:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render README
        run: quarto render README.Rmd

      - name: Commit and push
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md man/figures/README-*
          git diff --staged --quiet || git commit -m "Re-render README.qmd" && git push
