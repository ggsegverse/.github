on:
  workflow_call:
    inputs:
      extra-packages:
        description: Extra packages passed to setup-r-dependencies.
        required: false
        type: string
        default: "any::codemetar, local::."

name: update-codemeta (reusable)

permissions:
  contents: write
  pull-requests: write

jobs:
  update-codemeta:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    if: "!contains(github.event.head_commit.message, 'cm-skip')"

    steps:
      - name: Mint ggseg-bot token
        id: bot
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GGSEG_BOT_APP_ID }}
          private-key: ${{ secrets.GGSEG_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.bot.outputs.token }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ inputs.extra-packages }}

      - name: Update codemeta.json
        run: codemetar::write_codemeta()
        shell: Rscript {0}

      # main is protected (PR + signed commits). create-pull-request commits via
      # the API, so the commit is GitHub-signed; ggseg-bot is a ruleset bypass
      # actor (bypass_mode: pull_request) so it can merge without a human review.
      - name: Open codemeta PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.bot.outputs.token }}
          add-paths: codemeta.json
          commit-message: "chore: update codemeta.json"
          branch: ci/update-codemeta
          delete-branch: true
          title: "chore: update codemeta.json"
          body: |
            Automated update of `codemeta.json` from `DESCRIPTION`.
            Generated by the `update-codemeta` reusable workflow.

      - name: Merge codemeta PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
        run: |
          pr="${{ steps.cpr.outputs.pull-request-number }}"
          repo="${{ github.repository }}"
          branch="ci/update-codemeta"
          # Merge via the REST endpoint, not `gh pr merge`: the GraphQL mutation
          # behind `gh pr merge` does not honour the ggseg-bot ruleset bypass and
          # is rejected with "base branch policy prohibits the merge". The REST
          # merge endpoint honours the bypass_actor grant.
          for i in 1 2 3 4 5; do
            if gh api -X PUT "repos/$repo/pulls/$pr/merge" -f merge_method=squash; then
              echo "merged codemeta PR #$pr"
              gh api -X DELETE "repos/$repo/git/refs/heads/$branch" || true
              exit 0
            fi
            echo "merge attempt $i not ready; retrying..."
            sleep 10
          done
          echo "::error::failed to merge codemeta PR #$pr"
          exit 1
